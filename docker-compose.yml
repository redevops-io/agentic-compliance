version: '3.8'

services:
  scanner:
    image: docker.io/openscap/openscap
    volumes:
      - ./policies:/policies
      - evidence-vault:/evidence

  opa:
    image: openpolicyagent/opa:latest
    command: run --server /policies
    volumes:
      - ./policies:/policies
    ports:
      - "8181:8181"

  agent:
    build:
      context: ./agents
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - opa
      - scanner
    volumes:
      - evidence-vault:/evidence

volumes:
  evidence-vault:
    driver: local
